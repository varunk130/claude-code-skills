    <line x1="1200" y1="0" x2="1200" y2="560"/>
  </g>

  <g transform="translate(80, 60)">
    <rect x="0" y="0" width="220" height="32" rx="16" fill="#161c30" stroke="#D97757" stroke-opacity="0.55" stroke-width="1"/>
