<svg viewBox="0 0 1280 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Claude Code Skills. 29 production-grade skills across 5 domains.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="55%" stop-color="#10162c"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <radialGradient id="glowOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D97757" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#D97757" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2342" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#10162c" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#ffd9c8"/>
      <stop offset="100%" stop-color="#D97757"/>
    </linearGradient>
    <linearGradient id="termGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1226"/>
      <stop offset="100%" stop-color="#070a18"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#ffffff" opacity="0.06"/>
    </pattern>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="560" fill="url(#bg)"/>
  <rect width="1280" height="560" fill="url(#dots)"/>

  <circle cx="160" cy="120" r="320" fill="url(#glowOrange)"/>
  <circle cx="1120" cy="500" r="360" fill="url(#glowPurple)"/>

  <g opacity="0.18" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="280" x2="1280" y2="280"/>
