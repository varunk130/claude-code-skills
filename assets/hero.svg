  </g>

  <text x="80" y="158" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="56" font-weight="800" fill="url(#title)" letter-spacing="-1.8">Claude Code Skills</text>

  <text x="80" y="198" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="20" font-weight="500" fill="#dde4f5">
